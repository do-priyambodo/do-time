<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0" />
      <stop offset="100%" stop-color="#94A3B8" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.1)" />
      <stop offset="50%" stop-color="rgba(255, 255, 255, 0.3)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.05)" />
    </linearGradient>
    <linearGradient id="sandGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#FBBF24" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background for app icon feel -->
  <rect width="512" height="512" rx="112" fill="#0F172A" />

  <!-- Hourglass Frame -->
  <!-- Top Bar -->
  <path d="M 128 96 L 384 96 C 393 96 400 103 400 112 L 400 128 C 400 137 393 144 384 144 L 128 144 C 119 144 112 137 112 128 L 112 112 C 112 103 119 96 128 96 Z" fill="url(#frameGrad)" />
  <!-- Bottom Bar -->
  <path d="M 128 368 L 384 368 C 393 368 400 375 400 384 L 400 400 C 400 409 393 416 384 416 L 128 416 C 119 416 112 409 112 400 L 112 384 C 112 375 119 368 128 368 Z" fill="url(#frameGrad)" />

  <!-- Glass Body -->
  <path d="M 160 144 
           L 352 144 
           C 352 200, 288 240, 288 256 
           C 288 272, 352 312, 352 368 
           L 160 368 
           C 160 312, 224 272, 224 256 
           C 224 240, 160 200, 160 144 Z" 
        fill="url(#glassGrad)" 
        stroke="#E2E8F0" 
        stroke-width="4" 
        stroke-opacity="0.5" />

  <!-- Sand (Hourglass Done - ⏳) -->
  <path d="M 164 368 
           C 164 330, 210 300, 256 300 
           C 302 300, 348 330, 348 368 
           Z" 
        fill="url(#sandGrad)" 
        filter="url(#glow)" />
  
  <!-- Falling sand droplet -->
  <circle cx="256" cy="290" r="6" fill="#FBBF24" />
  <circle cx="256" cy="260" r="4" fill="#FBBF24" opacity="0.5" />

  <!-- Reflection line -->
  <path d="M 180 160 C 180 180, 210 220, 240 240" stroke="white" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.2" />
</svg>
